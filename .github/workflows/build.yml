name: Build APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire le projet
        run: unzip -o jbm-tv-android.zip

      - name: Installer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer plateforme SDK
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Compiler l'APK debug
        working-directory: jbm-tv-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: jbm-tv-apk
          path: jbm-tv-android/app/build/outputs/apk/debug/app-debug.apk
